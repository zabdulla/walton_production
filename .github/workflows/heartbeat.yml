name: Pipeline heartbeat

# The weekly update runs on a single Mac via launchd. If that machine is
# asleep, off, or broken, the pipeline fails SILENTLY — no run means no
# error. This workflow checks every Tuesday whether fresh data landed on
# Monday and opens an issue if it didn't.
#
# It also checks that the LIVE site matches the repo: on 2026-07-06 the
# data was committed and pushed but the Pages deploy failed transiently,
# leaving the published site stale — a failure the data-age check alone
# cannot see. If the live site is behind, it dispatches a redeploy and
# only opens an issue if that doesn't fix it.
on:
  schedule:
    - cron: '0 14 * * 2'  # Tuesdays 14:00 UTC (morning after the Monday run)
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  actions: write  # dispatch deploy-pages.yml when the live site is stale

jobs:
  check-freshness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check age of last data update
        id: age
        run: |
          last_commit_ts=$(git log -1 --format=%ct -- data/aggregated_daily_data.xlsx)
          now=$(date +%s)
          age_days=$(( (now - last_commit_ts) / 86400 ))
          echo "age_days=$age_days" >> "$GITHUB_OUTPUT"
          echo "Last data update was $age_days day(s) ago."

      - name: Open issue if data is stale
        if: ${{ steps.age.outputs.age_days > 8 }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Pipeline heartbeat: no data update in ${{ steps.age.outputs.age_days }} days"
          existing=$(gh issue list --state open --search "Pipeline heartbeat in:title" --json number --jq 'length')
          if [ "$existing" -eq 0 ]; then
            gh issue create --title "$title" --body \
              "data/aggregated_daily_data.xlsx was last updated ${{ steps.age.outputs.age_days }} days ago.
          The weekly launchd job on the Mac may not have run. Check:
          1. Is the Mac on and awake? (\`launchctl list | grep walton\`)
          2. logs/weekly_update.log for errors
          3. Run manually: \`python3 src/weekly_update.py --all\`"
          else
            echo "Heartbeat issue already open; not duplicating."
          fi

      - name: Check live site matches repo
        id: live
        env:
          SITE: https://zabdulla.github.io/walton_production
        run: |
          repo_latest=$(grep -oE '20[0-9]{2}-[0-9]{2}-[0-9]{2}' docs/daily.html | sort -u | tail -1)
          # Unique query string busts the Pages CDN cache
          live_latest=$(curl -fsSL "$SITE/daily.html?hb=$GITHUB_RUN_ID" \
            | grep -oE '20[0-9]{2}-[0-9]{2}-[0-9]{2}' | sort -u | tail -1 || echo unreachable)
          echo "repo=$repo_latest live=$live_latest"
          echo "repo_latest=$repo_latest" >> "$GITHUB_OUTPUT"
          if [[ "$live_latest" == "unreachable" || "$live_latest" < "$repo_latest" ]]; then
            echo "stale=true" >> "$GITHUB_OUTPUT"
          else
            echo "stale=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Redeploy and re-check if live site is stale
        if: ${{ steps.live.outputs.stale == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          SITE: https://zabdulla.github.io/walton_production
        run: |
          echo "Live site is behind the repo — dispatching a redeploy."
          gh workflow run deploy-pages.yml --repo "$GITHUB_REPOSITORY"
          sleep 180
          repo_latest="${{ steps.live.outputs.repo_latest }}"
          live_latest=$(curl -fsSL "$SITE/daily.html?hb2=$GITHUB_RUN_ID" \
            | grep -oE '20[0-9]{2}-[0-9]{2}-[0-9]{2}' | sort -u | tail -1 || echo unreachable)
          echo "after redeploy: repo=$repo_latest live=$live_latest"
          if [[ "$live_latest" == "unreachable" || "$live_latest" < "$repo_latest" ]]; then
            title="Pipeline heartbeat: live site stale (repo has $repo_latest, site has $live_latest)"
            existing=$(gh issue list --state open --search "live site stale in:title" --json number --jq 'length')
            if [ "$existing" -eq 0 ]; then
              gh issue create --title "$title" --body \
                "The published site is behind the repository even after an automatic redeploy.
          Check the Deploy Pages runs: https://github.com/$GITHUB_REPOSITORY/actions/workflows/deploy-pages.yml
          Manual fix: \`gh workflow run deploy-pages.yml\`, or the GitHub Pages status page if deploys keep failing."
            else
              echo "Stale-site issue already open; not duplicating."
            fi
          else
            echo "Redeploy fixed it — live site is current again."
          fi
