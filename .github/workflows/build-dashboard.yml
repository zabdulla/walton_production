name: Verify Pipeline

# CI is VERIFY-ONLY. The local weekly orchestrator (src/weekly_update.py,
# launchd, Mondays 12:00) builds and pushes the published dashboards.
# The old commit-back step here ("Update dashboards [automated]") raced
# that push on every run, producing chronic rebase conflicts that twice
# stalled publication for weeks. CI now proves the code + data build a
# healthy dashboard, and touches nothing.

on:
  push:
    branches: [main]
    paths:
      - 'src/*.py'
      - 'tests/**'
      - 'data/*.xlsx'
      - 'requirements.txt'
      - 'requirements.lock'

  # Allow manual trigger from Actions tab
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies (locked)
        run: pip install -r requirements.lock

      - name: Run test suite
        run: python -m pytest tests/ -v --tb=short

      - name: Build weekly dashboard (verify only)
        run: python src/build_interactive_dashboard.py

      - name: Build daily dashboard (verify only)
        run: python src/build_daily_dashboard.py

      - name: Smoke-test built HTML
        run: python -m pytest tests/test_dashboards_smoke.py -v
